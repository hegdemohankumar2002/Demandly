version: '3.8'

services:
  api1:
    build: .
    environment:
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - MASTER_API_KEY=${MASTER_API_KEY}
    restart: always

  api2:
    build: .
    environment:
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - MASTER_API_KEY=${MASTER_API_KEY}
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    restart: always
